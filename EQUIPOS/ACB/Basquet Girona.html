<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basquet Girona</title>
<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f4f6f9;
}

/* ===== HEADER ===== */

.header {
    background: linear-gradient(135deg, #0d2b52, #133b73);
    color: white;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
}

.header img {
    width: 80px;
}

.header h1 {
    margin: 0;
    font-size: 26px;
}

/* ===== CONTENIDO PRINCIPAL ===== */

.content {
    max-width: 1100px;
    margin: 30px auto;
    display: flex;
    gap: 40px;
}

/* ===== CARD IZQUIERDA (FICHA CLUB) ===== */

.info-column {
    flex: 1;
    background: white;
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

.info-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #eef1f5;
}

.info-row:last-child {
    border-bottom: none;
}

.info-label {
    width: 180px;
    font-weight: 600;
    color: #0d2b52;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
}

.escudo {
    height: 50px;
    width: auto;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}

.escudo2 {
    height: 35px;
    width: auto;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
}

.info-value {
    color: #333;
    font-size: 15px;
}

.bandera {
    height: 25px;
    width: auto;
    margin-left: 8px;
    border-radius: 3px;
    vertical-align: middle;
}

.uniforme-mini img {
    width: 180px;
    height: 70px;
    object-fit: contain;
}

/* ===== LINKS OFICIALES ===== */

.links {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

.links a {
    padding: 9px 18px;
    background: #0d2b52;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.3s ease;
}

.links a:hover {
    background: #133b73;
    transform: translateY(-2px);
}
/* ===== COLUMNA DERECHA ===== */

.media-column {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.media-box {
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

.media-box strong {
    display: block;
    margin-bottom: 12px;
    color: #0d2b52;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
}

.media-box img {
    width: 100%;
    border-radius: 10px;
}

.mapa-hover {
    position: relative;
    display: inline-block;
}

.mapa-mini {
    width: 120px;
    cursor: pointer;
}

.mapa-grande {
    display: none;
    position: absolute;
    top: 0;
    left: 130px;   /* separación hacia la derecha */
    width: 400px;
    border: 2px solid #333;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
    background: white;
    z-index: 1000;
}

/* 👇 Aquí está la magia */
.mapa-hover:hover .mapa-grande {
    display: block;
}

/* ===== RESPONSIVE ===== */

@media (max-width: 900px) {

    .content {
        flex-direction: column;
        width: 95%;
        margin: 20px auto;
    }

    .left-panel,
    .right-panel {
        width: 100%;
    }

    .info-label {
        width: 140px;
    }

}</style>
</head>
<body>

<div class="header">
    <img src="../../LOGOS/ACB/LIGA_ENDESA.png" alt="Liga Endesa">
    <h1>Basquet Girona</h1>
</div>

<div class="content">

    <!-- COLUMNA IZQUIERDA -->

<div class="info-row">

</div>

        <img src="../../LOGOS/ACB/Basquet Girona_Logo.png" class="escudo">

</div>
