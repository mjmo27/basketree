<title>Primera División Nacional Riojana (Liga Regular)</title>
<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f4f6f9;
}

/* ===== HEADER SUPERIOR ===== */

.header {
    background: linear-gradient(135deg, #0d2b52, #133b73);
    color: white;
    padding: 25px;
    text-align: center;
}

.acb-title {
    margin: 0;
    font-size: 26px;
    letter-spacing: 2px;
    font-weight: 600;
}

/* ===== SECCIÓN LIGA COMPACTA PREMIUM ===== */

.league-section {
    background: linear-gradient(180deg, #133b73, #0d2b52);
    color: white;
    padding: 25px 20px;   /* MÁS COMPACTO */
    text-align: center;
}

/* ===== BADGE NIVEL ===== */

.league-level-top {
    display: inline-block;
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 1.5px;
    padding: 8px 22px;
    background: rgba(255,255,255,0.12);
    border: 2px solid white;
    border-radius: 40px;
    backdrop-filter: blur(4px);
    margin-bottom: 15px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
}

.top-links{
    display:flex;
    justify-content:center;
    gap:25px;
    margin:10px 0 5px;
}

.top-links a{
    background:none;              /* 👈 sin fondo */
    color:white;                 /* 👈 texto blanco */
    padding:0;                   /* 👈 sin caja */
    border:none;
    text-decoration:none;
    font-weight:900;             /* 👈 más negrita */
    font-size:16px;
    letter-spacing:1px;
    transition:0.3s;
}

.top-links a:hover{
    color:#7df9ff;               /* 👈 efecto azul brillante */
}

/* ===== LOGO + TITULO ===== */

.league-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
}

/* Logo */
.league-logo {
    width: 100px;  /* ligeramente más compacto */
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
}

.sexo-logo {
    width: 30px;  /* ligeramente más compacto */
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
}

/* Título liga */
.league-title {
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 3px 3px 12px rgba(0,0,0,0.7);
}

/* ===== GRID EQUIPOS ===== */

.teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    padding: 40px;
}

.team-card {
    background: #0d2b52;
    padding: 10px;
    text-align: center;
    border-radius: 10px;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
}

.team-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.team-card img {
    width: 40px;
    height: 40px;
    object-fit: contain;
}

.team-name {
    margin-top: 12px;
    font-weight: bold;
    color: white;
    font-size: 15px;
}

/* ===== LINKS INFERIORES ===== */

.links {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 30px 0;
    background: #ffffff;
}

.links a {
    margin: 0 20px;
    text-decoration: none;
    font-weight: bold;
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 1.5px;
    color: #f4f6f9;
    transition: color 0.3s;
    background: rgba(255,255,255,0.12);
    border: 2px solid white;
    border-radius: 40px;
    backdrop-filter: blur(4px);
    margin-bottom: 15px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
    text-align: center;
}

.links a:hover {
    color: #133b73;
}

/* ===== ANIMACIONES ===== */

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ===== RESPONSIVE ===== */

@media (max-width: 768px) {

    .league-header {
        flex-direction: column;
        gap: 15px;
    }

    .league-logo {
        width: 70px;
    }

    .league-title {
        font-size: 24px;
        text-align: center;
    }

    .teams-grid {
        padding: 20px;
        gap: 15px;
    }

    .team-card img {
        width: 50px;
        height: 50px;
    }

    .team-name {
        font-size: 14px;
    }

    .links {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .links a {
        margin: 0;
        font-size: 16px;
    }
}

</style>
